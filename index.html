function ri(rank) {
  if (!rank) return 999;
  var r = rank.replace(/\s*(East|West)\s*/i, "").trim();
  var i = RANKS.findIndex(function(x) { return r.toLowerCase().startsWith(x.toLowerCase()); });
  return i === -1 ? 998 : i;
}
function rs(rank) {
  if (!rank) return "";
  var s = rank.includes("East") ? "E" : rank.includes("West") ? "W" : "";
  var c = rank.replace(/\s*(East|West)\s*/i, "").trim();
  var a = { Yokozuna:"Y", Ozeki:"O", Sekiwake:"S", Komusubi:"K" };
  for (var k in a) { if (c.startsWith(k)) return a[k]+s; }
  var m = c.match(/Maegashira\s*(\d+)/i);
  return m ? "M"+m[1]+s : c;
}
function rt(rank) {
  if (!rank) return "maegashira";
  if (rank.includes("Yokozuna")) return "yokozuna";
  if (rank.includes("Ozeki")) return "ozeki";
  if (rank.includes("Sekiwake") || rank.includes("Komusubi")) return "sanyaku";
  return "maegashira";
}
async function fjson(url) {
  try {
    var r = await fetch(url);
    if (!r.ok) return null;
    var t = await r.text();
    if (!t || !t.trim()) return null;
    return JSON.parse(t);
  } catch(e) { console.warn("fetch fail:", url, e); return null; }
}

/* Normalize banzuke {east:[], west:[]} into flat wrestler array */
function norm(data) {
  if (!data) return [];
  var all = [];
  if (data.east && Array.isArray(data.east)) all = all.concat(data.east);
  if (data.west && Array.isArray(data.west)) all = all.concat(data.west);
  if (all.length === 0 && Array.isArray(data)) all = data;
  return all.map(function(e) {
    return {
      id: e.rikishiID || e.rikishiId || e.id || 0,
      name: e.shikonaEn || e.shikona || "Unknown",
      rank: e.rank || "",
      rv: e.rankValue || 0,
      wins: e.wins || 0,
      losses: e.losses || 0,
      abs: e.absences || 0,
      record: Array.isArray(e.record) ? e.record : [],
    };
  });
}

/* Build day's match pairs from banzuke records */
function dayMatches(ws, di) {
  var ms = [], used = {};
  for (var i = 0; i < ws.length; i++) {
    var w = ws[i];
    if (used[w.id]) continue;
    var rec = w.record[di];
    if (!rec) continue;
    var on = rec.opponentShikonaEn || rec.opponentShikona || rec.opponent || "";
    if (!on) continue;
    var opp = null;
    for (var j = 0; j < ws.length; j++) {
      if (ws[j].name === on && !used[ws[j].id]) { opp = ws[j]; break; }
    }
    used[w.id] = true;
    if (!opp) {
      var iw = rec.result === "win" || rec.result === "fusen win";
      ms.push({ eId: w.id, eN: w.name, eR: w.rank, wId: 0, wN: on, wR: "", win: iw ? w.id : 0, km: rec.kimarite || "" });
      continue;
    }
    used[opp.id] = true;
    var east = ri(w.rank) <= ri(opp.rank) ? w : opp;
    var west = east === w ? opp : w;
    var er = east.record[di], wr = west.record[di];
    var ew = er && (er.result === "win" || er.result === "fusen win");
    var ww = wr && (wr.result === "win" || wr.result === "fusen win");
    ms.push({
      eId: east.id, eN: east.name, eR: east.rank,
      wId: west.id, wN: west.name, wR: west.rank,
      win: ew ? east.id : ww ? west.id : null,
      km: (ew ? (er.kimarite||"") : (wr ? wr.kimarite||"" : "")) || "",
    });
  }
  ms.sort(function(a,b) { return ri(a.eR) - ri(b.eR); });
  return ms;
}

function Standings({ws,onSel}) {
  var sorted = useMemo(function(){
    return ws.slice().sort(function(a,b){
      var d=(b.wins-b.losses)-(a.wins-a.losses);
      if(d!==0)return d;
      if(b.wins!==a.wins)return b.wins-a.wins;
      return ri(a.rank)-ri(b.rank);
    });
  },[ws]);
  if(!sorted.length) return <Err msg="No standings data available yet."/>;
  var tc={yokozuna:"#d4a843",ozeki:"#c47a3a",sanyaku:"#8a7d6b",maegashira:"#5a5248"};

          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#BFA168,#8a6d3b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:700,color:"#1a1612",fontFamily:"'Noto Sans JP',sans-serif",boxShadow:"0 2px 8px rgba(191,161,104,0.3)"}}>{"\u529B"}</div>
          <div>
            <h1 style={{fontSize:"1.25rem",fontWeight:700,color:"#e8dcc8",letterSpacing:"0.03em",lineHeight:1.1}}>DOHY&#332;</h1>
            <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.55rem",color:"#6b6156",textTransform:"uppercase",letterSpacing:"0.15em"}}>Grand Sumo Results</div>
          </div>
        </div>
        <div style={{position:"relative"}}>
          <select value={bid} onChange={function(e){setBid(e.target.value);}} style={{background:"#242019",border:"1px solid #2d271f",borderRadius:6,color:"#BFA168",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.75rem",padding:"0.4rem 1.5rem 0.4rem 0.6rem",cursor:"pointer",outline:"none"}}>
            {BASHO.map(function(b){return <option key={b.id} value={b.id}>{b.label}</option>;})}
          </select>
          <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:"#BFA168",fontSize:"0.6rem"}}>{"\u25BE"}</span>
        </div>
      </div>
      {cb&&<div style={{display:"flex",justifyContent:"center",gap:"1.5rem",marginBottom:"0.75rem",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.65rem",color:"#6b6156"}}>
        <span>{cb.location}</span><span>&middot;</span><span>{cb.month} Tournament</span><span>&middot;</span><span>Makuuchi Division</span>
      </div>}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid #2d271f"}}>
        {tabs.map(function(t){return <button key={t.k} onClick={function(){setTab(t.k);}} style={{flex:1,padding:"0.6rem 0.5rem",background:"none",border:"none",borderBottom:t.k===tab?"2px solid #BFA168":"2px solid transparent",color:t.k===tab?"#BFA168":"#5a5248",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.75rem",fontWeight:t.k===tab?600:400,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em",transition:"all 0.2s"}}>{t.l}</button>;})}
      </div>
    </header>

    <main style={{maxWidth:500,margin:"0 auto",padding:"0.5rem 0.5rem 3rem"}}>
      {ld?<Spinner/>:err?<Err msg={err} retry={function(){setRc(function(c){return c+1;});}}/> :<>
        {tab==="results"&&<>
          <DaySel day={day} set={setDay} max={maxD}/>
          <div style={{textAlign:"center",marginBottom:"1rem",fontFamily:"'Crimson Text',serif",fontSize:"1.1rem",color:"#8a7d6b"}}>
            Day {day}
            {day===maxD&&<span style={{marginLeft:8,fontSize:"0.65rem",color:"#BFA168",fontFamily:"'Noto Sans JP',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>Latest</span>}
          </div>
          {!matches.length?<Err msg="No matches available for this day."/>
          :matches.map(function(m,i){return <MCard key={i} m={m} onSel={function(id,n){setSel({id:id,name:n});}}/>;})}</>}
        {tab==="standings"&&<Standings ws={ws} onSel={function(id,n){setSel({id:id,name:n});}}/>}
        {tab==="kimarite"&&<KStats ws={ws}/>}
      </>}
    </main>

    {sel&&<RikishiModal rid={sel.id} rname={sel.name} ws={ws} onClose={function(){setSel(null);}}/>}

    <footer style={{textAlign:"center",padding:"1.5rem 1rem",borderTop:"1px solid #2d271f",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.6rem",color:"#3a3225"}}>
      Data provided by sumo-api.com &middot; Not affiliated with the Japan Sumo Association
    </footer>
  </div>);
}
